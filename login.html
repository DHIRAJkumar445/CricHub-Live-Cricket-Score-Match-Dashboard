<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - CricHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="main-nav">
    <div class="nav-container">
      <a href="index.html">Home</a>
      <a href="teams.html">Teams</a>
      <a href="players.html">Players</a>
      <a href="schedule.html">Schedule</a>
    </div>
  </nav>

  <div class="login-page">
    <div class="login-card card">
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to access your CricHub dashboard</p>

      <form id="loginForm" onsubmit="loginUser(event)">
        <input id="username" name="username" type="text" placeholder="Username" autocomplete="username" required>
        <input id="password" name="password" type="password" placeholder="Password" autocomplete="current-password" required>

        <div class="login-actions">
          <button type="submit">Login</button>
        </div>
        <div id="loginError" class="login-error" aria-live="polite"></div>
      </form>

      <p style="font-size:0.9rem;color:#666;margin-top:12px;">
        Don't have an account? <a href="register.html">Register</a>
      </p>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.checkLoggedIn && window.checkLoggedIn()) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
